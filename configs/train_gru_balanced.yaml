# GRU — balanced (macro-first) variant
run_name: gru_balanced
model: gru

manifest_path: processed/water_events/events_manifest.csv
sequences_dir: processed/water_events/sequences
label_map_path: processed/water_events/label_encoding_benchmark.json
checkpoint_dir: runs/gru_balanced/checkpoints
log_dir: runs/gru_balanced/logs

batch_size: 256
num_workers: 4
pin_memory: true
use_weighted_sampler: false

use_class_weights: true
loss_type: ce

augment: true
aug_noise_std: 0.01
aug_amp_min: 0.9
aug_amp_max: 1.1
aug_time_warp: 0.0

lr: 0.0003
weight_decay: 0.0001
scheduler: cosine
cosine_t_max: 60

epochs: 60
early_stop_patience: 20
seed: 42
log_every_n_steps: 50
save_best_only: true

gru_hidden: 128
gru_layers: 2
gru_dropout: 0.3
gru_bidirectional: true
