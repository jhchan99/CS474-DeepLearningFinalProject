# Multi-scale CNN — minority-focused variant (weighted sampler + focal + strong aug + metadata head)
run_name: multiscale_cnn_minority
model: multiscale_cnn

manifest_path: processed/water_events/events_manifest.csv
sequences_dir: processed/water_events/sequences
label_map_path: processed/water_events/label_encoding_benchmark.json
checkpoint_dir: runs/multiscale_cnn_minority/checkpoints
log_dir: runs/multiscale_cnn_minority/logs

batch_size: 256
num_workers: 4
pin_memory: true
use_weighted_sampler: true

use_class_weights: true
loss_type: focal
focal_gamma: 2.0

augment: true
aug_noise_std: 0.03
aug_amp_min: 0.7
aug_amp_max: 1.3
aug_time_warp: 0.1

use_metadata_head: true

lr: 0.0003
weight_decay: 0.0001
scheduler: cosine
cosine_t_max: 60

epochs: 60
early_stop_patience: 20
seed: 42
log_every_n_steps: 50
save_best_only: true

multiscale_cnn_stem_channels: 16
multiscale_cnn_kernels: [3, 7, 15, 31]
multiscale_cnn_channels: [96, 128, 160]
multiscale_cnn_dropout: 0.3
