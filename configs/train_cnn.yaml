# 1-D CNN baseline — cross-site generalization
run_name: cnn_baseline
model: cnn

manifest_path: processed/water_events/events_manifest.csv
sequences_dir: processed/water_events/sequences
label_map_path: processed/water_events/label_encoding_benchmark.json
checkpoint_dir: runs/cnn_baseline/checkpoints
log_dir: runs/cnn_baseline/logs

batch_size: 256
num_workers: 4
pin_memory: true
use_weighted_sampler: false

use_class_weights: true

lr: 0.001
weight_decay: 0.0001
scheduler: cosine
cosine_t_max: 50

epochs: 50
early_stop_patience: 10
seed: 42
log_every_n_steps: 50
save_best_only: true

# CNN architecture
cnn_channels: [32, 64, 128]
cnn_kernel_size: 5
cnn_dropout: 0.3
